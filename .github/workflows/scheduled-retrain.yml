name: Scheduled Model Retraining

on:
  schedule:
    # Run weekly on Monday at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      instance_type:
        description: 'SageMaker instance type'
        required: false
        type: choice
        options:
          - ml.m5.xlarge
          - ml.m5.2xlarge
          - ml.c5.xlarge
        default: 'ml.m5.xlarge'
      experiment_name:
        description: 'MLflow experiment name'
        required: false
        type: string
        default: 'house-prices-scheduled'

env:
  AWS_REGION: eu-west-1
  S3_DATA_BUCKET: ${{ secrets.S3_DATA_BUCKET }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}

jobs:
  # ============================================================================
  # Check if retraining is needed
  # ============================================================================
  check-data:
    name: Check Data Freshness
    runs-on: ubuntu-latest
    outputs:
      should-retrain: ${{ steps.check.outputs.should-retrain }}
      data-count: ${{ steps.check.outputs.data-count }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check training data
        id: check
        run: |
          # Check if new data exists in S3
          DATA_COUNT=$(aws s3 ls s3://${S3_DATA_BUCKET}/data/ --recursive | wc -l)
          echo "data-count=$DATA_COUNT" >> $GITHUB_OUTPUT

          # Always retrain on schedule (you can add more logic here)
          echo "should-retrain=true" >> $GITHUB_OUTPUT
          echo "Found $DATA_COUNT files in training data bucket"

  # ============================================================================
  # Get latest Docker image
  # ============================================================================
  get-image:
    name: Get Latest ECR Image
    runs-on: ubuntu-latest
    needs: check-data
    if: needs.check-data.outputs.should-retrain == 'true'
    outputs:
      image-uri: ${{ steps.get-image.outputs.image-uri }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get latest image
        id: get-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: house-price-mlops
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "Using image: $IMAGE_URI"

  # ============================================================================
  # Run Training Job
  # ============================================================================
  train:
    name: Run SageMaker Training
    runs-on: ubuntu-latest
    needs: [check-data, get-image]
    if: needs.check-data.outputs.should-retrain == 'true'
    outputs:
      job-name: ${{ steps.train.outputs.job-name }}
      model-s3-uri: ${{ steps.train.outputs.model-s3-uri }}
      run-id: ${{ steps.train.outputs.run-id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 sagemaker mlflow

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Training Job
        id: train
        env:
          ECR_IMAGE: ${{ needs.get-image.outputs.image-uri }}
          INSTANCE_TYPE: ${{ github.event.inputs.instance_type || 'ml.m5.xlarge' }}
          EXPERIMENT_NAME: ${{ github.event.inputs.experiment_name || 'house-prices-scheduled' }}
        run: |
          JOB_NAME="scheduled-$(date +%Y%m%d-%H%M%S)"
          echo "Starting scheduled training job: $JOB_NAME"

          python scripts/run_training_job.py \
            --s3-data s3://${S3_DATA_BUCKET}/data/train.csv \
            --job-name $JOB_NAME \
            --ecr-image $ECR_IMAGE \
            --role $SAGEMAKER_ROLE_ARN \
            --mlflow-tracking-uri $MLFLOW_TRACKING_URI \
            --mlflow-experiment-name $EXPERIMENT_NAME \
            --instance-type $INSTANCE_TYPE \
            --n-estimators 1000 \
            --max-depth 8 \
            --learning-rate 0.03 \
            --subsample 0.8 \
            --colsample-bytree 0.8

          # Get model S3 URI
          MODEL_S3_URI=$(aws sagemaker describe-training-job \
            --training-job-name $JOB_NAME \
            --query 'ModelArtifacts.S3ModelArtifacts' \
            --output text)

          echo "job-name=$JOB_NAME" >> $GITHUB_OUTPUT
          echo "model-s3-uri=$MODEL_S3_URI" >> $GITHUB_OUTPUT

      - name: Get MLflow Run ID
        id: get-run
        run: |
          python - <<EOF
          import mlflow
          mlflow.set_tracking_uri("$MLFLOW_TRACKING_URI")

          experiment = mlflow.get_experiment_by_name("${{ github.event.inputs.experiment_name || 'house-prices-scheduled' }}")
          if experiment:
              runs = mlflow.search_runs(
                  experiment_ids=[experiment.experiment_id],
                  order_by=["start_time DESC"],
                  max_results=1
              )
              if len(runs) > 0:
                  run_id = runs.iloc[0]["run_id"]
                  print(f"Latest run ID: {run_id}")
                  with open("$GITHUB_OUTPUT", "a") as f:
                      f.write(f"run-id={run_id}\n")
          EOF

  # ============================================================================
  # Evaluate Model Performance
  # ============================================================================
  evaluate:
    name: Evaluate Model Metrics
    runs-on: ubuntu-latest
    needs: train
    outputs:
      should-deploy: ${{ steps.evaluate.outputs.should-deploy }}
      rmse: ${{ steps.evaluate.outputs.rmse }}
      r2: ${{ steps.evaluate.outputs.r2 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas numpy

      - name: Evaluate model metrics
        id: evaluate
        env:
          RUN_ID: ${{ needs.train.outputs.run-id }}
        run: |
          python - <<EOF
          import mlflow
          import sys

          mlflow.set_tracking_uri("$MLFLOW_TRACKING_URI")

          # Get run metrics
          run = mlflow.get_run("$RUN_ID")
          metrics = run.data.metrics

          rmse = metrics.get("rmse", 999)
          r2 = metrics.get("r2", 0)

          print(f"Model Metrics:")
          print(f"  RMSE: {rmse:.4f}")
          print(f"  R²: {r2:.4f}")

          # Decision criteria (customize these thresholds)
          RMSE_THRESHOLD = 0.15  # Max acceptable RMSE
          R2_THRESHOLD = 0.80    # Min acceptable R²

          should_deploy = "false"
          if rmse < RMSE_THRESHOLD and r2 > R2_THRESHOLD:
              should_deploy = "true"
              print(f"✅ Model passed evaluation criteria")
          else:
              print(f"❌ Model failed evaluation criteria")
              print(f"   RMSE: {rmse:.4f} (threshold: {RMSE_THRESHOLD})")
              print(f"   R²: {r2:.4f} (threshold: {R2_THRESHOLD})")

          # Write outputs
          with open("$GITHUB_OUTPUT", "a") as f:
              f.write(f"should-deploy={should_deploy}\n")
              f.write(f"rmse={rmse:.4f}\n")
              f.write(f"r2={r2:.4f}\n")
          EOF

  # ============================================================================
  # Register Model if metrics are good
  # ============================================================================
  register:
    name: Register Model
    runs-on: ubuntu-latest
    needs: [train, evaluate]
    if: needs.evaluate.outputs.should-deploy == 'true'
    outputs:
      model-version: ${{ steps.register.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Register model to Staging
        id: register
        env:
          RUN_ID: ${{ needs.train.outputs.run-id }}
        run: |
          python - <<EOF
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri("$MLFLOW_TRACKING_URI")
          client = MlflowClient()

          # Register model from run
          model_uri = f"runs:/$RUN_ID/model"
          mv = mlflow.register_model(model_uri, "house-price-xgboost")

          # Transition to Staging for testing
          client.transition_model_version_stage(
              name="house-price-xgboost",
              version=mv.version,
              stage="Staging",
              archive_existing_versions=False
          )

          # Add description
          client.update_model_version(
              name="house-price-xgboost",
              version=mv.version,
              description=f"Scheduled retrain - RMSE: ${{ needs.evaluate.outputs.rmse }}, R²: ${{ needs.evaluate.outputs.r2 }}"
          )

          print(f"Model version {mv.version} registered to Staging")

          # Write output
          with open("$GITHUB_OUTPUT", "a") as f:
              f.write(f"version={mv.version}\n")
          EOF

  # ============================================================================
  # Send Notification
  # ============================================================================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [train, evaluate, register]
    if: always()

    steps:
      - name: Notification
        run: |
          echo "============================================"
          echo "Scheduled Retraining Summary"
          echo "============================================"
          echo "Training Job: ${{ needs.train.outputs.job-name }}"
          echo "Model S3 URI: ${{ needs.train.outputs.model-s3-uri }}"
          echo ""
          echo "Metrics:"
          echo "  RMSE: ${{ needs.evaluate.outputs.rmse }}"
          echo "  R²: ${{ needs.evaluate.outputs.r2 }}"
          echo ""
          if [ "${{ needs.evaluate.outputs.should-deploy }}" == "true" ]; then
            echo "✅ Model registered as version ${{ needs.register.outputs.model-version }}"
            echo "   Status: Staged for deployment"
          else
            echo "❌ Model did not meet quality criteria"
            echo "   Action: Not registered, manual review needed"
          fi
          echo "============================================"

          # You can add Slack/Email notification here
          # Example: curl -X POST $SLACK_WEBHOOK_URL -d '{"text":"Training completed"}'
